name: test-ci
on:
  workflow_dispatch:
jobs:
  test:
    uses: YiAgent/OpenCI/.github/workflows/reusable-ci.yml@v3.1.9
    with:
      image-name: openci-test-app
      model: glm-4.7
      enable-ai-smoke: false
      enable-failure-agent: false
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
