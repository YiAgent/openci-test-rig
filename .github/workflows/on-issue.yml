# test-rig on-issue — exercises issue.yml via GLM proxy.
name: on-issue

on:
  issues:
    types: [opened, reopened, edited, closed]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        type: string
        required: false
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  triage:
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    uses: YiAgent/OpenCI/.github/workflows/issue.yml@v3.0.0-rc3
    with:
      openci-ref: v3.0.0-rc3
      model:      glm-5.1
      mode:       ${{ inputs.mode || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}

  welcome:
    if: github.event_name == 'pull_request_target' || github.event_name == 'issues'
    uses: YiAgent/OpenCI/.github/workflows/issue.yml@v3.0.0-rc3
    with:
      openci-ref: v3.0.0-rc3
      mode:       welcome

  stale-sweep:
    if: github.event_name == 'schedule'
    uses: YiAgent/OpenCI/.github/workflows/issue.yml@v3.0.0-rc3
    with:
      openci-ref: v3.0.0-rc3
      mode:       stale
