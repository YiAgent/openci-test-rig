name: auto-update-openci

on:
  schedule:
    - cron: "37 3 * * *"  # daily at 03:37 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest OpenCI tag
        id: latest-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get all tags, filter to semver vX.Y.Z, sort, get latest
          TAG=$(gh api repos/YiAgent/OpenCI/git/refs/tags --jq '.[].ref' \
            | grep -oP 'refs/tags/v\d+\.\d+\.\d+$' \
            | sed 's|refs/tags/||' \
            | sort -V \
            | tail -1)
          if [ -z "$TAG" ]; then
            # Fallback: try vX.Y tags
            TAG=$(gh api repos/YiAgent/OpenCI/git/refs/tags --jq '.[].ref' \
              | grep -oP 'refs/tags/v\d+\.\d+$' \
              | sed 's|refs/tags/||' \
              | sort -V \
              | tail -1)
          fi
          echo "Latest OpenCI tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Find current tag reference
        id: current
        run: |
          # Extract the current tag from workflow files
          CURRENT=$(grep -roP 'YiAgent/OpenCI/.github/workflows/[^@]+@v[\d.]+' .github/workflows/ \
            | head -1 \
            | grep -oP '@v[\d.]+$' \
            | sed 's/@//')
          echo "Current tag in workflows: $CURRENT"
          echo "tag=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Update workflow references
        if: steps.latest-tag.outputs.tag != steps.current.outputs.tag && steps.latest-tag.outputs.tag != ''
        run: |
          OLD="v${{ steps.current.outputs.tag }}"
          NEW="v${{ steps.latest-tag.outputs.tag }}"
          echo "Updating: $OLD → $NEW"

          # Update all workflow file references (skip auto-update itself)
          find .github/workflows -name '*.yml' -not -name 'auto-update*' \
            -exec sed -i "s|@${OLD}|@${NEW}|g" {} +

          echo "Updated files:"
          grep -rl "@${NEW}" .github/workflows/

      - name: Create Pull Request
        if: steps.latest-tag.outputs.tag != steps.current.outputs.tag && steps.latest-tag.outputs.tag != ''
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "chore: bump OpenCI from v${{ steps.current.outputs.tag }} to v${{ steps.latest-tag.outputs.tag }}"
          title: "chore: bump OpenCI v${{ steps.current.outputs.tag }} → v${{ steps.latest-tag.outputs.tag }}"
          body: |
            Auto-update OpenCI workflow references.

            **Latest tag:** [`v${{ steps.latest-tag.outputs.tag }}`](https://github.com/YiAgent/OpenCI/releases/tag/v${{ steps.latest-tag.outputs.tag }})
            **Current:** `v${{ steps.current.outputs.tag }}`

            This PR was automatically generated by the `auto-update-openci` workflow.
          branch: auto/update-openci-tag
          delete-branch: true
