# test-rig on-pr — exercises pr.yml via GLM proxy.
name: on-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: [on-pr, on-ci]
    types: [completed]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  checks:
    if: github.event_name == 'pull_request'
    uses: YiAgent/OpenCI/.github/workflows/pr.yml@v3.0.0-rc3
    with:
      openci-ref:       v3.0.0-rc3
      model:            glm-5.1
      enable-ai-review: true
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}

  summarise:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    uses: YiAgent/OpenCI/.github/workflows/pr.yml@v3.0.0-rc3
    with:
      openci-ref:    v3.0.0-rc3
      model:         glm-5.1
      pr-agent-mode: summarise
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}

  feedback:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
    uses: YiAgent/OpenCI/.github/workflows/pr.yml@v3.0.0-rc3
    with:
      openci-ref:    v3.0.0-rc3
      model:         glm-5.1
      pr-agent-mode: feedback
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}

  docubot:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && contains(github.event.comment.body, '@docubot')
    uses: YiAgent/OpenCI/.github/workflows/pr.yml@v3.0.0-rc3
    with:
      openci-ref:    v3.0.0-rc3
      model:         glm-5.1
      pr-agent-mode: docubot
      pr-number:     ${{ github.event.issue.number }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
