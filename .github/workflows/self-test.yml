# Test wrapper for OpenCI reusable-self-test.yml.
name: openci-self-test-rig

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  call-self-test:
    uses: YiAgent/OpenCI/.github/workflows/reusable-self-test.yml@fcbc0d2fa12550d5cb10131d38ce4d3f41c86315
    with:
      runner: ubuntu-latest
      enable-zizmor: true
      enable-pyflakes: true
