# Test wrapper for OpenCI consolidated release.yml.
name: openci-release-rig

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Release facets to run
        required: true
        type: choice
        options: [marketplace, docker, both]
        default: marketplace

# marketplace: contents:write (tags). docker: packages:write + id-token (cosign).
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  call-release:
    uses: YiAgent/OpenCI/.github/workflows/reusable-release.yml@v3.1.18
    with:
      openci-ref: main
      mode: ${{ github.event.inputs.mode }}
      image-name: openci-test-app
      registry: ghcr.io
