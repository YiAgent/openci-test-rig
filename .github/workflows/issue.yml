# Test wrapper for OpenCI consolidated issue.yml.
name: openci-issue-rig

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: Force a specific mode through workflow_dispatch
        required: false
        type: choice
        default: sentry-triage
        options: [sentry-triage, auto-label, dedupe, ai-triage, auto-assign, command, linear-branch]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  call-issue:
    uses: YiAgent/OpenCI/.github/workflows/issue.yml@feat/marketplace-reusable-workflows
    with:
      openci-ref: feat/marketplace-reusable-workflows
      # Forward dispatch mode (empty for natural triggers — upstream
      # then routes by github.event_name).
      mode: ${{ github.event.inputs.mode || '' }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      sentry-token:      ${{ secrets.SENTRY_TOKEN }}
      linear-token:      ${{ secrets.LINEAR_TOKEN }}
