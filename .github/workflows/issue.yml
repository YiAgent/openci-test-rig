# Test wrapper for OpenCI consolidated issue.yml.
name: openci-issue-rig

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Force a specific mode through workflow_dispatch
        required: false
        type: choice
        default: ai-triage
        options: [sentry-triage, auto-label, dedupe, ai-triage, auto-assign]

# Union of permissions needed across all jobs in upstream issue.yml.
permissions:
  contents: write       # linear-branch creates a branch
  issues: write
  pull-requests: write  # slash commands may comment on PRs
  id-token: write

jobs:
  call-issue:
    uses: YiAgent/OpenCI/.github/workflows/issue.yml@feat/marketplace-reusable-workflows
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      sentry-token:      ${{ secrets.SENTRY_TOKEN }}
      linear-token:      ${{ secrets.LINEAR_TOKEN }}
