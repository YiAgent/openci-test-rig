# Test wrapper for OpenCI consolidated issue.yml.
name: openci-issue-rig

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: Force a specific mode through workflow_dispatch
        required: false
        type: choice
        default: sentry-triage
        options: [sentry-triage, auto-label, dedupe, ai-triage, auto-assign, command, linear-branch]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  call-issue:
    uses: YiAgent/OpenCI/.github/workflows/reusable-issue.yml@fe3a90ebe57318c1612774a753290b1ce3c9d7c6
    with:
      openci-ref: main
      # Forward dispatch mode (empty for natural triggers — upstream
      # then routes by github.event_name).
      mode: ${{ github.event.inputs.mode || '' }}
      # GLM-via-Anthropic-shim test: keep secret name 'anthropic-api-key'
      # and point Claude at the Zhipu endpoint via api-base-url.
      model: glm-4.7
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
      sentry-token:      ${{ secrets.SENTRY_TOKEN }}
      linear-token:      ${{ secrets.LINEAR_TOKEN }}
