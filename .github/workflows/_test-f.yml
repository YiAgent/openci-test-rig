name: test-f
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
permissions: {}
concurrency:
  group: test-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  echo:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3
    if: github.event.pull_request != null
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - run: echo "test-f passed"
