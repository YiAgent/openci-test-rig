name: gen-coverage
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p coverage
          cat > coverage/lcov.info << 'LCOV'
TN:
SF:main.py
FNF:0
FNH:0
LF:0
LH:0
end_of_record
LCOV
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
