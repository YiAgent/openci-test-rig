# Test wrapper for OpenCI consolidated pr.yml quality gate.
name: openci-pr-rig

on:
  pull_request:

# pr.yml fans out lint/test/scan/build/agent-review jobs that need a wide
# permission union.
permissions:
  contents: read
  actions: read
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  call-pr:
    uses: YiAgent/OpenCI/.github/workflows/reusable-pr.yml@fe3a90ebe57318c1612774a753290b1ce3c9d7c6
    with:
      openci-ref: main
      model: glm-4.7
      enable-ai-review: true
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
