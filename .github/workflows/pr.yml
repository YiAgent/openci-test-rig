# Test wrapper for OpenCI consolidated pr.yml quality gate.
name: openci-pr-rig

on:
  pull_request:

# pr.yml fans out lint/test/scan/build/agent-review jobs that need a wide
# permission union.
permissions:
  contents: read
  actions: read
  checks: write
  issues: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  call-pr:
    uses: YiAgent/OpenCI/.github/workflows/pr.yml@feat/marketplace-reusable-workflows
    with:
      openci-ref: feat/marketplace-reusable-workflows
      model: glm-5.1
      enable-ai-review: true
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
