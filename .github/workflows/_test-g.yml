name: test-g
on:
  workflow_call:
    inputs:
      runner:
        description: desc
        required: false
        type: string
        default: ubuntu-latest
permissions: {}
concurrency:
  group: test-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with: { egress-policy: audit }
      - run: echo "test-g passed"
