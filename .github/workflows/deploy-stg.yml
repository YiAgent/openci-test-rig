# Test wrapper for OpenCI staging deploy workflow.
name: openci-stg-deploy-rig

on:
  workflow_dispatch:
    inputs:
      image-digest:
        description: Container image digest
        required: true
        type: string

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  call-stg:
    uses: YiAgent/OpenCI/.github/workflows/reusable-stg.yml@b36e5e38be815146eb9e875477fe7b3499222b9a
    with:
      openci-ref: main
      image-digest: ${{ github.event.inputs.image-digest }}
      image-name: openci-test-app
      registry: ghcr.io
      app-name: openci-test-app
      deploy-type: docker
      ssh-host: ${{ vars.STG_SSH_HOST }}
      ssh-user: ${{ vars.STG_SSH_USER || 'deploy' }}
      ssh-port: ${{ vars.STG_SSH_PORT || '22' }}
      deploy-mode: compose
      compose-file: docker-compose.yml
      compose-project-dir: /home/deploy/openci-test-app
      health-url: ${{ vars.STG_HEALTH_URL || '' }}
    secrets:
      ssh-key-stg: ${{ secrets.SSH_KEY_STG }}
      slack-webhook-url: ${{ secrets.SLACK_CI_WEBHOOK }}
