# Test wrapper for OpenCI consolidated docs.yml.
#
# Reusable workflows inherit the *caller's* permission cap. We grant the
# union needed by docs.yml (contents: read for build, pages + id-token
# for the deploy job).
name: openci-docs-rig

on:
  push:
    branches: [main]
    paths: ["docs/**", "*.md"]
  pull_request:
    paths: ["docs/**", "*.md"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  call-docs:
    uses: YiAgent/OpenCI/.github/workflows/docs.yml@feat/marketplace-reusable-workflows
    with:
      openci-ref: feat/marketplace-reusable-workflows
      docs-dir: docs
      site-dir: site
