# Test wrapper for OpenCI pr-agent functionality via pr.yml mode routing.
# The pr-agent functionality is now part of pr.yml with a mode input.
name: openci-pr-agent-rig

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [pr]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: Which agent job to test
        required: true
        type: choice
        options: [summarise, feedback, docubot, test-gen]
      pr-number:
        description: Target PR number
        required: true
        type: string

# Union of permissions across summarise / feedback / docubot / test-gen.
permissions:
  contents: read
  actions: read
  checks: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  call-pr-agent:
    uses: YiAgent/OpenCI/.github/workflows/reusable-pr.yml@v3.1.18
    with:
      openci-ref: main
      model: glm-4.7
      enable-ai-review: true
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url:      ${{ secrets.ANTHROPIC_BASE_URL }}
