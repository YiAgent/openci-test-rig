# Test wrapper for OpenCI consolidated pr-agent.yml.
name: openci-pr-agent-rig

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: [pr]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: Which agent job to test
        required: true
        type: choice
        options: [summarise, feedback, docubot, test-gen]
      pr-number:
        description: Target PR number
        required: true
        type: string

permissions: {}

jobs:
  call-pr-agent:
    uses: YiAgent/OpenCI/.github/workflows/pr-agent.yml@feat/marketplace-reusable-workflows
    with:
      mode:      ${{ github.event.inputs.mode }}
      pr-number: ${{ github.event.inputs.pr-number }}
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
