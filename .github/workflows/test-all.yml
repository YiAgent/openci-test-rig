name: test-all-workflows
on:
  workflow_dispatch:
jobs:
  test-docs:
    uses: YiAgent/OpenCI/.github/workflows/reusable-docs.yml@v3.1
    with:
      docs-path: docs
      site-dir: site
      enable-agent: false
      deploy-docs: false
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
