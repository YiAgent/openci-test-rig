name: test-all
on:
  workflow_dispatch:
jobs:
  deps:
    uses: YiAgent/OpenCI/.github/workflows/reusable-deps.yml@fe3a90ebe57318c1612774a753290b1ce3c9d7c6
    with:
      runner: ubuntu-latest
  docs:
    uses: YiAgent/OpenCI/.github/workflows/reusable-docs.yml@fe3a90ebe57318c1612774a753290b1ce3c9d7c6
    with:
      docs-path: docs
      enable-agent: false
      deploy-docs: false
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      api-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
