# Test wrapper for OpenCI consolidated prd-observe.yml.
name: openci-prd-observe-rig

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which observer to run
        required: true
        type: choice
        options: [canary-watch, terraform-drift, verify-fix]
      infra-dir:
        description: (terraform-drift only) infra directory path
        required: false
        default: infrastructure

# canary-watch + verify-fix may file issues; verify-fix may comment on PRs;
# terraform-drift uses id-token (Terraform Cloud OIDC).
permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  call-prd-observe:
    uses: YiAgent/OpenCI/.github/workflows/reusable-observability.yml@fcbc0d2fa12550d5cb10131d38ce4d3f41c86315
    with:
      openci-ref: main
      mode:      ${{ github.event.inputs.mode }}
      infra-dir: ${{ github.event.inputs.infra-dir }}
    secrets:
      sentry-token: ${{ secrets.SENTRY_TOKEN }}
